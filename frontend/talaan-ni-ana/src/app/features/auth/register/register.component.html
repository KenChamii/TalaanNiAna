<app-particles />
<div class="login-wrap">
  <form class="login-card" [formGroup]="form" (ngSubmit)="submit()">
    <p class="eyebrow">POS System</p>
    <h1>Gumawa ng Account<span>.</span></h1>
    <p class="subtitle">Para makapag-manage ng iyong tindahan</p>

    <label>Pangalan ng Tindahan</label>
    <input type="text" formControlName="storeName" placeholder="Tindahan ni Ana" />

    <label>Pangalan Mo</label>
    <input type="text" formControlName="displayName" placeholder="Ana Reyes" />

    <label>Username</label>
    <input type="text" formControlName="username" placeholder="ana_tindahan" />

    <label>Password</label>
    <input type="password" formControlName="password" placeholder="••••••••••" />

    <label>Ulitin ang Password</label>
    <input type="password" formControlName="confirmPassword" placeholder="••••••••••" />

    <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>

    <button type="submit" class="btn-primary full-width" [disabled]="isLoading()">
      {{ isLoading() ? 'Naglo-load...' : 'Gumawa ng Account' }}
    </button>

    <p class="switch-link">
      May account ka na? <a routerLink="/login">Mag-login dito</a>
    </p>
  </form>
</div>
