<app-particles />
<div class="login-wrap">
  <form class="login-card" [formGroup]="form" (ngSubmit)="submit()">
    <p class="eyebrow">POS System</p>
    <h1>Talaan ni Ana<span>.</span></h1>
    <p class="subtitle">Mag-login para makapasok sa tindahan</p>

    <label>Pangalan / Email</label>
    <input type="text" formControlName="username" placeholder="ana_tindahan" />

    <label>Password / Access</label>
    <input type="password" formControlName="password" placeholder="••••••••••" />

    <label class="checkbox-row">
      <input type="checkbox" formControlName="rememberMe" />
      Tandaan Ako
    </label>

    <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>

    <button type="submit" class="btn-primary full-width" [disabled]="isLoading()">
      {{ isLoading() ? 'Naglo-load...' : 'Pumasok sa POS' }}
    </button>

    <p class="switch-link">
      Wala ka pang account? <a routerLink="/register">Mag-register dito</a>
    </p>
  </form>
</div>
